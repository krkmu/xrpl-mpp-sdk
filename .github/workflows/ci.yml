name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege: every job here only reads the repo (install, type-check,
# lint, test). No job needs write access, so pin the token down at the
# workflow level.
permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to full commit SHAs (version in the trailing comment) so
      # a repointed or compromised mutable tag cannot inject unreviewed code.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:types
      - run: pnpm lint
      - run: pnpm test

  integration:
    # Gated -- runs on push to main, on PRs labelled `run-integration`, and
    # on manual dispatch. Failures here do NOT block PRs because the public
    # devnet faucet can be flaky; rely on this job for end-to-end signal,
    # not as a merge gate.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-integration'))
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:integration
        env:
          NODE_OPTIONS: '--no-warnings'
        continue-on-error: false
